<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Login – Ninja Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a; --deep: #111; --panel: #161616;
    --red: #c8102e; --red-glow: rgba(200,16,46,0.35);
    --white: #f5f5f0; --muted: #b2b2aa; --border: rgba(255,255,255,0.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'Rajdhani', sans-serif; font-weight: 400; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

  .card {
    width: 100%; max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    padding: 3rem 2.5rem;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '忍'; font-family: 'Bebas Neue', sans-serif;
    font-size: 12rem; color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.03);
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none; line-height: 1;
  }

  .card-label { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.6rem; }
  .card-label-line { width: 24px; height: 1px; background: var(--red); }
  .card-label-text { font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--red); }

  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.08em; margin-bottom: 0.3rem; position: relative; }
  h1 span { color: var(--red); }
  .subtitle { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; position: relative; }

  .field-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.1rem; position: relative; }
  label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  input {
    background: var(--deep); border: 1px solid var(--border);
    color: var(--white); padding: 0.85rem 1rem;
    font-family: 'Rajdhani', sans-serif; font-size: 1rem;
    outline: none; transition: border-color 0.3s; width: 100%;
  }
  input:focus { border-color: var(--red); }

  .btn {
    width: 100%; background: var(--red); color: var(--white); border: none;
    padding: 1rem; font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 0.95rem; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer; transition: all 0.3s;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    margin-top: 0.5rem; position: relative;
  }
  .btn:hover { background: #a80e26; box-shadow: 0 6px 30px var(--red-glow); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg { font-size: 0.88rem; margin-top: 1rem; padding: 0.8rem 1rem; position: relative; display: none; }
  .msg.error { background: rgba(200,16,46,0.08); border: 1px solid rgba(200,16,46,0.25); color: #ff6b6b; }
  .msg.success { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); color: #22c55e; }

  .forgot-link { text-align: right; margin-top: -0.6rem; margin-bottom: 1rem; }
  .forgot-link a { font-size: 0.82rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .forgot-link a:hover { color: var(--red); }

  /* Attempt counter bar */
  .attempt-bar { margin-top: 1rem; display: none; }
  .attempt-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.05em; }
  .attempt-dots { display: flex; gap: 0.4rem; }
  .attempt-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); border: 1px solid rgba(255,255,255,0.1); transition: background 0.3s; }
  .attempt-dot.filled { background: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<div class="card">
  <div class="card-label">
    <div class="card-label-line"></div>
    <span class="card-label-text">Manager Access</span>
  </div>
  <h1>MANAGER <span>LOGIN</span></h1>
  <p class="subtitle">Authorized personnel only.</p>

  <div class="field-group">
    <label>Email</label>
    <input type="email" id="managerEmail" placeholder="manager@example.com" autocomplete="off">
  </div>

  <div class="field-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <div class="forgot-link">
    <a href="/forgot-password/" id="forgotLink" style="display:none;">Forgot password?</a>
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Log In →</button>

  <div class="msg" id="msg"></div>

  <div class="attempt-bar" id="attemptBar">
    <div class="attempt-label">Failed attempts</div>
    <div class="attempt-dots" id="attemptDots">
      <div class="attempt-dot" id="dot1"></div>
      <div class="attempt-dot" id="dot2"></div>
      <div class="attempt-dot" id="dot3"></div>
      <div class="attempt-dot" id="dot4"></div>
    </div>
  </div>
</div>

<script>
  let failedAttempts = 0;

  async function doLogin() {
    const email = document.getElementById('managerEmail').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const res = await fetch('/api/manager/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ managerEmail: email, password })
      });
      const data = await res.json();

      if (data.status === 'success') {
        showMsg('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/ninja-admin/dashboard/', 1000);
      } else {
        failedAttempts++;
        updateAttemptDots();

        showMsg(data.message || 'Login failed.', 'error');
        btn.disabled = false;
        btn.textContent = 'Log In →';

        // Show forgot password link after 2 failures
        if (failedAttempts >= 2 || data.forgot_password_url) {
          document.getElementById('forgotLink').style.display = 'inline';
        }

        // Clear password field
        document.getElementById('password').value = '';
      }
    } catch(e) {
      showMsg('Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Log In →';
    }
  }

  function updateAttemptDots() {
    document.getElementById('attemptBar').style.display = 'block';
    for (let i = 1; i <= 4; i++) {
      const dot = document.getElementById('dot' + i);
      dot.classList.toggle('filled', i <= failedAttempts);
    }
  }

  function showMsg(text, type) {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = 'msg ' + type;
    msg.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
