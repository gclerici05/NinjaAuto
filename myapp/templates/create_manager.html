<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Manager – Ninja Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a; --deep: #111; --panel: #161616;
    --red: #c8102e; --red-glow: rgba(200,16,46,0.35);
    --white: #f5f5f0; --muted: #b2b2aa; --border: rgba(255,255,255,0.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'Rajdhani', sans-serif; font-weight: 400; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

  .card {
    width: 100%; max-width: 460px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    padding: 3rem 2.5rem;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '忍'; font-family: 'Bebas Neue', sans-serif;
    font-size: 12rem; color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.03);
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none; line-height: 1;
  }

  .card-label { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.6rem; }
  .card-label-line { width: 24px; height: 1px; background: var(--red); }
  .card-label-text { font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--red); }

  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.08em; margin-bottom: 0.3rem; position: relative; }
  h1 span { color: var(--red); }
  .subtitle { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; position: relative; }

  .field-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.1rem; position: relative; }
  label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  input {
    background: var(--deep); border: 1px solid var(--border);
    color: var(--white); padding: 0.85rem 1rem;
    font-family: 'Rajdhani', sans-serif; font-size: 1rem;
    outline: none; transition: border-color 0.3s; width: 100%;
  }
  input:focus { border-color: var(--red); }

  .btn {
    width: 100%; background: var(--red); color: var(--white); border: none;
    padding: 1rem; font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 0.95rem; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer; transition: all 0.3s;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    margin-top: 0.5rem; position: relative;
  }
  .btn:hover { background: #a80e26; box-shadow: 0 6px 30px var(--red-glow); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg { font-size: 0.88rem; margin-top: 1rem; padding: 0.8rem 1rem; position: relative; display: none; }
  .msg.error { background: rgba(200,16,46,0.08); border: 1px solid rgba(200,16,46,0.25); color: #ff6b6b; }
  .msg.success { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); color: #22c55e; }

  .login-link { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--muted); position: relative; }
  .login-link a { color: var(--red); text-decoration: none; }
  .login-link a:hover { text-decoration: underline; }

  .warning-banner {
    background: rgba(200,16,46,0.06); border: 1px solid rgba(200,16,46,0.2);
    padding: 0.8rem 1rem; margin-bottom: 1.5rem;
    font-size: 0.82rem; color: var(--muted); line-height: 1.6; position: relative;
  }
  .warning-banner strong { color: var(--red); }
</style>
</head>
<body>

<div class="card">
  <div class="card-label">
    <div class="card-label-line"></div>
    <span class="card-label-text">Admin Access</span>
  </div>
  <h1>CREATE <span>MANAGER</span></h1>
  <p class="subtitle">Internal access only. Do not share this URL.</p>

  <div class="warning-banner">
    <strong>⚠ Restricted Page</strong> — This page is not linked anywhere on the site. Keep this URL private.
  </div>

  <div class="field-group">
    <label>Full Name</label>
    <input type="text" id="managerName" placeholder="Liam Smith" autocomplete="off">
  </div>

  <div class="field-group">
    <label>Email</label>
    <input type="email" id="managerEmail" placeholder="manager@example.com" autocomplete="off">
  </div>

  <div class="field-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min. 8 characters">
  </div>

  <div class="field-group">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat password">
  </div>

  <button class="btn" id="createBtn" onclick="createManager()">Create Manager Account →</button>

  <div class="msg" id="msg"></div>

  <div class="login-link">
    Already have an account? <a href="/ninja-admin/login/">Log in →</a>
  </div>
</div>

<script>
  async function createManager() {
    const name = document.getElementById('managerName').value.trim();
    const email = document.getElementById('managerEmail').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('createBtn');
    const msg = document.getElementById('msg');

    msg.style.display = 'none';

    if (!name || !email || !password) {
      showMsg('All fields are required.', 'error'); return;
    }
    if (password.length < 8) {
      showMsg('Password must be at least 8 characters.', 'error'); return;
    }
    if (password !== confirm) {
      showMsg('Passwords do not match.', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating...';

    try {
      const res = await fetch('/api/manager/create/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ managerName: name, managerEmail: email, password })
      });
      const data = await res.json();

      if (data.status === 'success') {
        showMsg('Account created! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = '/ninja-admin/login/', 1500);
      } else {
        showMsg(data.message || 'Something went wrong.', 'error');
        btn.disabled = false; btn.textContent = 'Create Manager Account →';
      }
    } catch(e) {
      showMsg('Network error. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Create Manager Account →';
    }
  }

  function showMsg(text, type) {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = 'msg ' + type;
    msg.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') createManager(); });
</script>
</body>
</html>
